name: Fix native enforcement branch

on:
  push:
    branches: [agent/native-enforcement]

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/native-enforcement
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: npm install
      - run: npx biome check --write .
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --cached --quiet || git commit -m "style: apply safe Biome fixes"
          git push
