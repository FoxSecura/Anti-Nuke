name: Bug report
description: Report reproducible incorrect behavior
title: "[Bug]: "
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Provide a minimal reproduction and configuration.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Package version
    validations:
      required: true
  - type: input
    id: runtime
    attributes:
      label: Node.js and Discord.js versions
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or incidents
      render: shell
